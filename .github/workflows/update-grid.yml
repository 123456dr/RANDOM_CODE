name: Generate Animation

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # ⭐ 第一步：生成「單一 Repo」的貪食蛇圖（修正版寫法）
      - name: generate-repo-snake
        uses: Platane/snk/svg-only@v3
        with:
          # 🎯 關鍵修改：用 斜線 將「擁有者」與「專案名」綁在一起，套件就會強制唯獨抓這個專案！
          github_user_name: "123456dr/RANDOM_CODE"
          outputs: |
            dist/repo-snake.svg
            dist/repo-snake-dark.svg?palette=github-dark

      # 第二步：生成「整個 GitHub 帳號」的貪食蛇圖（保持原樣）
      - name: generate-global-snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: "123456dr"
          outputs: |
            dist/global-snake.svg
            dist/global-snake-dark.svg?palette=github-dark
            
      # 第三步：推送到 output 分支儲存
      - name: push-all-snakes-to-output-branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
